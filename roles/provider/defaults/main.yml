---
helm_install_version: v3.17.3

# Gateway API / NGINX Gateway Fabric (replaces ingress-nginx for provider edge)
ngf_git_ref: v2.5.1
cert_manager_chart_version: v1.19.1

# ACME / Let's Encrypt — set by setup_provider.sh (host_vars) or override manually
# acme_dns_provider: none | cloudflare | gcp
acme_dns_provider: none

# defaults file for provider
node: "http://akash-node-1:26657"

withdrawal_period: "12h"

# provider attributes
attributes:
  - key: host
    value: akash
  - key: tier
    value: community

# price targets
price_cpu: 1.60
price_memory: 0.30
price_hd_ephemeral: 0.02
price_hd_pers_hdd: 0.01
price_hd_pers_ssd: 0.03
price_hd_pers_nvme: 0.1
price_endpoint: 0.05
price_ip: 5
