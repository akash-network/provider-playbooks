---
- name: Create namespaces with labels
  kubernetes.core.k8s:
    name: "{{ item.name }}"
    kind: Namespace
    state: present
    api_version: v1
    definition:
      metadata:
        labels: "{{ item.labels }}"
  loop:
    - name: akash-services
      labels:
        akash.network/name: akash-services
        akash.network: 'true'
    - name: lease
      labels:
        akash.network: 'true'
    - name: akash-gateway
      labels:
        akash.network/name: akash-gateway
        akash.network: 'true'

- name: Create provider directory in specific user's home directory
  ansible.builtin.file:
    path: "/root/provider"
    state: directory
    mode: '0755'

- name: Install Akash node
  kubernetes.core.helm:
    name: akash-node
    chart_ref: akash/akash-node
    release_namespace: akash-services

- name: Apply Gateway API experimental CRDs for NGINX Gateway Fabric
  ansible.builtin.shell: |
    set -euo pipefail
    kubectl kustomize "https://github.com/nginx/nginx-gateway-fabric/config/crd/gateway-api/experimental?ref={{ ngf_git_ref }}" | kubectl apply --server-side -f -
  args:
    executable: /bin/bash
  register: ngf_crd_apply
  changed_when: ngf_crd_apply.rc == 0
  failed_when: ngf_crd_apply.rc != 0

- name: Stage NGINX Gateway Fabric Helm values
  ansible.builtin.copy:
    src: nginx-gateway-fabric-values.yaml
    dest: /root/provider/nginx-gateway-fabric-values.yaml
    mode: '0644'

- name: Install NGINX Gateway Fabric (Gateway API data plane)
  kubernetes.core.helm:
    name: ngf
    chart_ref: oci://ghcr.io/nginx/charts/nginx-gateway-fabric
    release_namespace: nginx-gateway
    create_namespace: true
    values_files:
      - /root/provider/nginx-gateway-fabric-values.yaml

- name: Install cert-manager
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    chart_version: "{{ cert_manager_chart_version }}"
    release_namespace: cert-manager
    create_namespace: true
    values:
      crds:
        enabled: true

- name: Copy price_script.sh to /root/provider/ directory
  ansible.builtin.copy:
    src: "files/price_script.sh"
    dest: "/root/provider/"
    mode: '0755'

- name: Read and base64 encode the price_script.sh file
  ansible.builtin.shell: cat /root/provider/price_script.sh | openssl base64 -A
  register: pricing_script_b64

- name: Extract tier from attributes
  ansible.builtin.set_fact:
    tier: "{{ item.value }}"
  when: item.key == 'tier'
  loop: "{{ attributes | default([]) }}"
  loop_control:
    label: "{{ item.key }}"

- name: Set default tier if not defined
  ansible.builtin.set_fact:
    tier: "community"
  when: tier is not defined

- name: copy the provider.yaml
  ansible.builtin.template:
    src: provider.yaml.j2
    dest: /root/provider/provider.yaml

- name: Configure wildcard TLS for Gateway (Let's Encrypt DNS-01 or self-signed placeholder)
  ansible.builtin.import_tasks: gateway_wildcard_tls.yml

- name: Generate placeholder default TLS key/cert for https-custom listener
  ansible.builtin.shell: |
    set -euo pipefail
    openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
      -keyout /root/provider/akash-default.key \
      -out /root/provider/akash-default.crt \
      -subj "/CN=default"
  args:
    executable: /bin/bash
    creates: /root/provider/akash-default.crt

- name: Ensure akash-default-tls Secret in akash-gateway (https-custom listener)
  ansible.builtin.shell: |
    kubectl -n akash-gateway create secret tls akash-default-tls \
      --cert=/root/provider/akash-default.crt \
      --key=/root/provider/akash-default.key \
      --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash

- name: Install akash-gateway (Gateway API, TCPRoutes, HTTPS listeners)
  kubernetes.core.helm:
    name: akash-gateway
    chart_ref: akash/akash-gateway
    release_namespace: akash-gateway
    create_namespace: true
    values_files:
      - /root/provider/provider.yaml

- name: Install Akash hostname-operator
  kubernetes.core.helm:
    name: akash-hostname-operator
    chart_ref: akash/akash-hostname-operator
    release_namespace: akash-services

- name: Build inventory operator storage classes list
  ansible.builtin.set_fact:
    inventory_storage_classes: "{{ ['default'] }}"

- name: Add persistent storage class to inventory operator
  ansible.builtin.set_fact:
    inventory_storage_classes: "{{ inventory_storage_classes + [storage_class_name] }}"
  when: has_persistent_storage | default(false)

- name: Add RAM storage class for GPU workloads
  ansible.builtin.set_fact:
    inventory_storage_classes: "{{ inventory_storage_classes + ['ram'] }}"
  when: has_gpu | default(false)

- name: Display inventory operator storage configuration
  ansible.builtin.debug:
    msg: "Inventory operator will be configured with storage classes: {{ inventory_storage_classes | join(', ') }}"

- name: Install Akash inventory-operator with storage classes
  kubernetes.core.helm:
    name: inventory-operator
    chart_ref: akash/akash-inventory-operator
    release_namespace: akash-services
    values:
      inventoryConfig:
        cluster_storage: "{{ inventory_storage_classes }}"

- name: Apply Akash CRD from URL
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/akash-network/provider/v{{ provider_version }}/pkg/apis/akash.network/crd.yaml"
  register: k8s_result

- name: Display success message for CRD application
  ansible.builtin.debug:
    msg: "Akash CRDs were applied successfully"
  when: k8s_result is succeeded

- name: Install Akash provider using Helm
  kubernetes.core.helm:
    name: akash-provider
    chart_ref: akash/provider
    release_namespace: akash-services
    values:
      bidpricescript: "{{ pricing_script_b64.stdout }}"
    values_files:
      - /root/provider/provider.yaml
